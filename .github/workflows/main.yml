name: Auto Schedule Sync

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    # 赋予机器人修改仓库和自动提交日历代码的权限
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Auto Schedule
        env:
          EDU_USER: ${{ secrets.EDU_USER }}
          EDU_PWD: ${{ secrets.EDU_PWD }}
        run: python auto_schedule.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.ics
          # 检查如果有变动，就提交并推送到您的仓库里
          git diff --staged --quiet || (git commit -m "Auto update schedule.ics" && git push)
