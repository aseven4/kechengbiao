name: 自动同步课表

on:
  workflow_dispatch:

jobs:
  run-python-script:
    name: 运行机器人
    runs-on: ubuntu-latest

    # 赋予修改仓库和提交代码的权限
    permissions:
      contents: write

    steps:
      - name: 拉取代码库
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫抓取课表
        env:
          EDU_USER: ${{ secrets.EDU_USER }}
          EDU_PWD: ${{ secrets.EDU_PWD }}
        run: python auto_schedule.py

      - name: 保存并推送到日历
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.ics
          # 如果 schedule.ics 没有变化，git diff 会静默退出；如果有变化，则 commit 并 push
          git diff --staged --quiet || (git commit -m "自动更新日历数据" && git push)
